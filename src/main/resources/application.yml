spring:
  application:
    name: movie-booking-system

  profiles:
    active: h2

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

app:
  jwt:
    # Demo secret only -- override via APP_JWT_SECRET env var in real deployments.
    secret: ${APP_JWT_SECRET:this-is-a-demo-secret-key-change-me-please-32bytes-min}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}   # 24h
  booking:
    hold-duration-minutes: ${APP_HOLD_DURATION_MINUTES:5}
    hold-sweep-interval-ms: ${APP_HOLD_SWEEP_INTERVAL_MS:30000}
  admin:
    bootstrap-enabled: ${APP_ADMIN_BOOTSTRAP_ENABLED:true}
    bootstrap-email: ${APP_ADMIN_BOOTSTRAP_EMAIL:admin@moviebooking.local}
    bootstrap-password: ${APP_ADMIN_BOOTSTRAP_PASSWORD:Admin@12345}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.moviebooking: INFO

---
spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:mem:moviebooking;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/moviebooking}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:moviebooking-test;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
    hikari:
      maximum-pool-size: 25
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
app:
  booking:
    hold-duration-minutes: 5
    hold-sweep-interval-ms: 999999999
